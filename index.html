    <!-- Meta Pixel queue stub.
         The actual Pixel script + init/track is deferred to src/lib/meta-pixel.js
         so we can gate it on iOS App Tracking Transparency (ATT) permission.
         Apple Guideline 5.1.2(i) requires apps to obtain user consent via the
         ATT prompt before performing cross-app tracking, and Meta Pixel
         qualifies as tracking. The stub here keeps any fbq() calls elsewhere
         in the codebase (CheckoutSuccess.jsx fires CompleteRegistration)
         from erroring before the real fbq lands — calls are queued and
         replayed once the real Pixel script loads. -->
    <script>
      window.fbq = window.fbq || function () { (window.fbq.queue = window.fbq.queue || []).push(arguments); };
      window.fbq.queue = window.fbq.queue || [];
    </script>

    <title>Caddie AI — AI Golf Coaching App for iPhone</title>
    <meta name="description" content="Caddie AI is an AI-powered golf coaching app for iPhone. Personalized practice plans, an AI coach that knows your game and a competitive leaderboard." />

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            console.log('[SW] Registered:', reg.scope);
          }).catch(function(err) {
            console.warn('[SW] Registration failed:', err);
          });
        });
      }
    </script>
